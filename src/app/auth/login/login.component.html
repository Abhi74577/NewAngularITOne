<!-- MAIN BACKGROUND -->
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-700 to-blue-900 p-4 md:p-6">

  <!-- CARD -->
  <div class="w-full max-w-5xl h-[100%] bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">

    <!-- LEFT SIDE -->
    <div class="w-full md:w-1/2 relative bg-gradient-to-br from-blue-600 to-blue-800 text-white flex flex-col justify-center px-6 md:px-12 py-10 overflow-hidden">

      <!-- CURVE -->
      <div class="absolute top-0 left-0 w-[250px] h-[250px] md:w-[400px] md:h-[400px] bg-blue-700"
           style="border-top-left-radius: 100%;">
      </div>

      <!-- FLOATING CIRCLES -->
      <div class="absolute bottom-10 left-10 w-24 h-24 md:w-40 md:h-40 bg-blue-500 rounded-full opacity-40 blur-xl"></div>
      <div class="absolute bottom-0 left-0 w-40 h-40 md:w-60 md:h-60 bg-blue-400 rounded-full opacity-30"></div>

      <!-- CONTENT -->
      <div class="relative z-10 text-center md:text-left">
        <h1 class="text-3xl md:text-4xl font-bold mb-4">WELCOME</h1>
        <p class="text-sm opacity-90 mb-4">YOUR HEADLINE NAME</p>

        <p class="text-xs md:text-sm opacity-80 max-w-xs mx-auto md:mx-0">
          Lorem ipsum dolor sit amet, consectetur adipiscing elit.
        </p>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="w-full md:w-1/2 p-6 md:p-10 flex flex-col justify-center">

      <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2 text-center md:text-left">
        Sign in
      </h2>

      <p class="text-gray-400 text-sm mb-6 text-center md:text-left">
        Welcome back! Please login
      </p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4 md:space-y-5">

        <!-- USER -->
        <input
          type="text"
          formControlName="userId"
          placeholder="User Name"
          class="w-full px-4 py-3 rounded-lg bg-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 transition shadow-sm"
        />

        <!-- PASSWORD -->
        <div class="relative">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Password"
            class="w-full px-4 py-3 rounded-lg bg-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 transition shadow-sm"
          />

          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="absolute right-4 top-3 text-blue-500 text-sm font-semibold"
          >
            SHOW
          </button>
        </div>

        <!-- OPTIONS -->
        <div class="flex justify-between items-center text-sm flex-wrap gap-2">
          <label class="flex items-center gap-2">
            <input type="checkbox" formControlName="rememberMe">
            Remember me
          </label>

          <a href="#" class="text-blue-500 hover:underline">
            Forgot Password?
          </a>
        </div>

        

      </form>
    </div>

  </div>
</div>
