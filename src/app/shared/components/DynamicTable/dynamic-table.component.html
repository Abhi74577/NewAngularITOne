<div
  class="w-full rounded-2xl border border-gray-200/60 dark:border-slate-700 bg-white dark:bg-slate-900 shadow-sm overflow-hidden">

  <!-- HEADER -->
  <div
    class="px-6 py-5 flex flex-col md:flex-row md:items-center md:justify-between gap-4 border-b border-gray-100 dark:border-slate-800">

    <div>
      <h2 class="text-lg font-semibold text-gray-900 dark:text-white tracking-tight">
        Data Table
      </h2>
      <p class="text-xs text-gray-500 mt-1" *ngIf="!isLoading">
        {{ paginatedData().length }} of {{ totalRecords() }} records
      </p>
    </div>

    <div class="flex items-center gap-3 w-full md:w-auto">

      <!-- SEARCH -->
      <div class="relative w-full md:w-72 group">
        <input [(ngModel)]="searchQuery" placeholder="Search records..."
          class="w-full pl-10 pr-8 py-2.5 text-sm rounded-xl border border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-800 focus:ring-2 focus:ring-blue-500 outline-none transition-all duration-200" />

        <svg
          class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-blue-500 transition">
          <circle cx="11" cy="11" r="8"></circle>
        </svg>

        <button *ngIf="searchQuery()" (click)="resetSearch()"
          class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
          ✕
        </button>
      </div>

      <!-- PAGE SIZE -->
      <select [ngModel]="pageSize()" (ngModelChange)="onPageSizeChange($event)"
        class="px-3 py-2 text-sm rounded-xl border border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-800">
        <option *ngFor="let size of pageSizeOptions" [value]="size">{{ size }}</option>
      </select>

    </div>
  </div>

  <!-- LOADING -->
  <div *ngIf="isLoading" class="flex flex-col items-center justify-center py-16 text-gray-500">
    <div class="w-8 h-8 border-4 border-gray-200 border-t-blue-500 rounded-full animate-spin mb-3"></div>
    Loading data...
  </div>

  <!-- TABLE -->
  <div *ngIf="!isLoading" class="overflow-x-auto">

    <table class="w-full text-sm">

      <!-- HEADER -->
      <thead
        class="bg-slate-50 dark:bg-slate-700 sticky top-0 backdrop-blur border-b border-gray-100 dark:border-slate-800">
        <tr>
          <th *ngFor="let column of columns" (click)="onColumnClick(column)"
            class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider text-gray-800 dark:text-gray-400"
            [ngClass]="column.sortable ? 'cursor-pointer hover:text-blue-600' : ''">

            <div class="flex items-center gap-1">
              {{ column.label || column.header }}
              <span class="inline-flex items-center transition-colors duration-200"
                [ngClass]="isSortedColumn(column) ? 'text-blue-600 dark:text-blue-400' : 'text-gray-400 dark:text-gray-500'"
                *ngIf="column.sortable"> <span class="text-xs leading-none transition-transform duration-200"
                  [ngClass]="{ 'transform rotate-180': getSortDirection(column) === 'asc', '': getSortDirection(column) === 'desc' }">
                  ⇅ </span> </span>
            </div>

          </th>

          <th class="px-6 py-3 text-center text-xs font-medium uppercase ">
            Actions
          </th>
        </tr>
      </thead>

      <!-- BODY -->
      <tbody class="divide-y divide-gray-100 dark:divide-slate-800">

        <tr *ngFor="let row of paginatedData(); let i = index"
          class="group transition-all duration-200 hover:bg-gray-50/70 dark:hover:bg-slate-800/60 hover:shadow-sm">

          <td *ngFor="let column of columns" class="px-6 py-4 text-gray-700 dark:text-gray-300">

            {{ getNestedValue(row, getColumnAccessor(column)) }}

          </td>

          <!-- ACTIONS -->
          <td class="px-6 py-4">

            <!-- Hidden until hover -->
            <div class="flex justify-center gap-1 opacity-100 transition">

              <button (click)="onEdit(row)"
                class="p-2 rounded-lg hover:bg-blue-100 dark:hover:bg-blue-900/30 text-gray-400 hover:text-blue-600 transition">
                ✏️
              </button>

              <button (click)="onDelete(row)"
                class="p-2 rounded-lg hover:bg-red-100 dark:hover:bg-red-900/30 text-gray-400 hover:text-red-600 transition">
                🗑️
              </button>

              <button (click)="onDownload(row)"
                class="p-2 rounded-lg hover:bg-green-100 dark:hover:bg-green-900/30 text-gray-400 hover:text-green-600 transition">
                ⬇️
              </button>

            </div>

          </td>

        </tr>

      </tbody>
    </table>

    <!-- EMPTY -->
    <div *ngIf="!hasData()" class="py-20 text-center text-gray-400">
      No records found
    </div>

  </div>

  <!-- FOOTER -->
  <div *ngIf="!isLoading && hasData()"
    class="px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4 border-t border-gray-100 dark:border-slate-800">

    <p class="text-xs text-gray-500">
      Page {{ currentPage() }} / {{ totalPages() }}
    </p>

    <!-- MODERN PAGINATION -->
    <div class="flex items-center gap-1 bg-gray-100 dark:bg-slate-800 p-1 rounded-xl">

      <button (click)="goToPage(currentPage() - 1)" [disabled]="currentPage() === 1"
        class="px-3 py-1.5 text-sm rounded-lg hover:bg-white dark:hover:bg-slate-700 transition disabled:opacity-40">
        ←
      </button>

      <button *ngFor="let pageNum of getPageNumbers()" (click)="goToPage(pageNum)"
        [ngClass]="pageNum === currentPage() ? 'bg-white dark:bg-slate-700 shadow text-blue-600' : ''"
        class="w-9 h-9 text-sm rounded-lg transition hover:bg-white dark:hover:bg-slate-700">
        {{ pageNum === -1 ? '...' : pageNum }}
      </button>

      <button (click)="goToPage(currentPage() + 1)" [disabled]="currentPage() === totalPages()"
        class="px-3 py-1.5 text-sm rounded-lg hover:bg-white dark:hover:bg-slate-700 transition disabled:opacity-40">
        →
      </button>

    </div>

  </div>

</div>
