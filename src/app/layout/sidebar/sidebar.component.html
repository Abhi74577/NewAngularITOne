<div
  class="fixed left-0 top-16 bottom-0 flex flex-col bg-surface/95 dark:bg-slate-900/95 backdrop-blur-md border-r border-gray-200 dark:border-slate-700 overflow-hidden z-40 transition-all duration-300"
  [style.width]="getSidebarWidth()"
>
  <!-- Logo -->
  <div class="flex items-center gap-3 px-5 py-4 border-b border-gray-200 dark:border-slate-700">
    <div class="w-11 h-11 flex items-center justify-center rounded-xl bg-primary-600/10 dark:bg-blue-900/30">
      <i class="fa-solid fa-briefcase text-xl text-primary-600 dark:text-blue-400"></i>
    </div>

    <span
      *ngIf="isExpanded()"
      class="text-base font-semibold text-primary dark:text-blue-400 truncate"
    >
      {{ getLogoText() }}
    </span>
  </div>

  <!-- Menu -->
  <nav class="flex-1 px-2 py-3 space-y-1 overflow-y-auto">

    <div *ngFor="let item of menuItems()">

      <!-- Main Item -->
      <div class="relative">
       <button 
        [routerLink]="!hasChildren(item) && item.route ? item.route : null"
        class="w-full flex items-center gap-3 px-3 py-3
        border-none bg-transparent text-on-surface dark:text-slate-300 rounded-lg 
        cursor-pointer transition-all duration-200 text-sm 
        font-medium text-left whitespace-nowrap hover:bg-surface-variant 
        dark:hover:bg-slate-800 hover:text-primary-600 dark:hover:text-blue-400 focus-visible:outline-2 
        focus-visible:outline-primary-600 focus-visible:outline-offset-0"
         [class.bg-primary-100]="isItemActive(item) || item.isExpanded" 
         [class.dark:bg-blue-900]="isItemActive(item) || item.isExpanded"
         [class.text-primary-600]="isItemActive(item) || item.isExpanded"
         [class.dark:text-blue-300]="isItemActive(item) || item.isExpanded"
         [class.shadow-md]="isItemActive(item)"
         [class.dark:shadow-lg]="isItemActive(item)"
         [class.border-l-4]="isItemActive(item)"
         [class.border-primary-600]="isItemActive(item)"
         [class.dark:border-blue-400]="isItemActive(item)"
          (mouseenter)="setHoveredMenu(hasChildren(item) ? item.id : null)" 
          (mouseleave)="setHoveredMenu(null)" 
          (click)="handleMenuClick($event, item)"
          [title]="!isExpanded() ? item.label : ''" > 
          <i class="flex-shrink-0 flex items-center justify-center w-6 h-6" [ngClass]="item.iconClass || 'fa-solid fa-circle'"></i>
            <span class="flex-1 overflow-hidden text-ellipsis" 
             *ngIf="isExpanded()">{{ item.label }}</span>
              <span class="flex-shrink-0 text-xs transition-transform duration-200" *ngIf="hasChildren(item) && isExpanded()" [class.rotate-180]="item.isExpanded || hasActiveChild(item)" > ▼ </span> 
       </button>

        <!-- Floating submenu (collapsed) -->
        <div
          *ngIf="hasChildren(item) && !isExpanded() && hoveredMenuId() === item.id"
          class="absolute left-full top-0 ml-3 w-52 bg-surface dark:bg-slate-800 border border-surface-variant dark:border-slate-700 rounded-xl shadow-xl py-2 animate-in fade-in slide-in-from-left-2"
        >
          <button
            *ngFor="let child of item.children" [routerLink]="child.route"
            [class.bg-primary-100]="isRouteActive(child.route)"
            [class.dark:bg-blue-900]="isRouteActive(child.route)"
            [class.text-primary-600]="isRouteActive(child.route)"
            [class.dark:text-blue-300]="isRouteActive(child.route)"
            [class.font-semibold]="isRouteActive(child.route)"
            [class.border-l-4]="isRouteActive(child.route)"
            [class.border-primary-600]="isRouteActive(child.route)"
            [class.dark:border-blue-400]="isRouteActive(child.route)"
            class="w-full flex items-center gap-3 px-4 py-2 text-sm text-on-surface dark:text-slate-300 transition-all duration-200 hover:bg-surface-variant dark:hover:bg-slate-700 hover:text-primary-600 dark:hover:text-blue-400"
          >
            <i class="text-base w-5 h-5 flex items-center justify-center" [ngClass]="child.iconClass || 'fa-solid fa-circle'"></i>
            <span class="truncate">{{ child.label }} p</span>
          </button>
        </div>
      </div>

      <!-- Inline submenu -->
      <div
        *ngIf="hasChildren(item) && isExpanded() && (item.isExpanded || hasActiveChild(item))"
        class="ml-5 mt-1 space-y-1 border-l border-surface-variant dark:border-slate-700 pl-3"
      >
        <button
          *ngFor="let child of item.children"
          [routerLink]="child.route"
          [class.bg-primary-50]="isRouteActive(child.route)"
          [class.dark:bg-blue-950]="isRouteActive(child.route)"
          [class.text-primary-600]="isRouteActive(child.route)"
          [class.dark:text-blue-300]="isRouteActive(child.route)"
          [class.font-semibold]="isRouteActive(child.route)"
          [class.border-l-2]="isRouteActive(child.route)"
          [class.border-primary-600]="isRouteActive(child.route)"
          [class.dark:border-blue-400]="isRouteActive(child.route)"
          [class.ml-0]="isRouteActive(child.route)"
          [class.pl-2]="isRouteActive(child.route)"
          class="w-full flex items-center gap-2 px-2 py-2 text-sm text-on-surface-variant dark:text-slate-400 rounded-lg transition-all duration-200 hover:bg-surface-variant dark:hover:bg-slate-800 hover:text-primary-600 dark:hover:text-blue-400"
        >
          <i class="text-sm w-4 h-4" [ngClass]="child.iconClass || 'fa-solid fa-circle'"></i>
          <span class="truncate">{{ child.label }}</span>
        </button>
      </div>

    </div>

  </nav>
</div>
