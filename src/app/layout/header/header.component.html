<header
  class="fixed top-0 left-0 right-0 h-16 bg-surface/95 backdrop-blur-md border-b border-gray-300 flex items-center justify-between px-4 md:px-6 z-50 transition-all duration-300"
>
  <!-- Left -->
   <div class="flex items-center gap-4">
    <button
      class="flex items-center justify-center w-10 h-10 border-none bg-transparent text-on-surface rounded-lg cursor-pointer transition-all duration-200 text-xl hover:bg-surface-variant hover:text-primary-600 focus-visible:outline-2 focus-visible:outline-primary-600 focus-visible:outline-offset-0"
      (click)="toggleSidebar()"
      title="Toggle Sidebar"
    >
      <span>☰</span>
    </button>
  </div>

  <!-- Right -->
  <div class="flex items-center gap-2">

    <!-- Theme Toggle -->
    <button
      (click)="toggleTheme()"
      [title]="themeService.getTheme() === 'light' ? 'Switch to Dark Mode' : 'Switch to Light Mode'"
      class="w-10 h-10 flex items-center justify-center rounded-xl text-on-surface transition-all duration-200 hover:bg-surface-variant hover:text-primary-600 active:scale-95 focus-visible:outline-2 focus-visible:outline-primary-600"
    >
      {{ getThemeIcon() }}
    </button>

    <!-- Divider -->
    <div class="hidden md:block w-px h-6 bg-surface-variant mx-1"></div>

    <!-- Profile -->
    <div class="relative" appClickOutside (clickOutside)="closeProfileDropdown()">

      <!-- Profile Button -->
      <button
        (click)="toggleProfileDropdown()"
        title="User Profile"
        class="flex items-center gap-2 pl-2 pr-3 py-1.5 rounded-xl transition-all duration-200 hover:bg-surface-variant active:scale-[0.98] focus-visible:outline-2 focus-visible:outline-primary-600"
      >
        <img
          src="https://ui-avatars.com/api/?name=John+Doe&background=random"
          alt="User Avatar"
          class="w-9 h-9 rounded-full ring-2 ring-primary-600/20"
        />

        <span class="hidden md:block text-sm font-medium text-on-surface">
          John Doe
        </span>

        <span class="hidden md:block text-xs text-on-surface-variant">
          ▾
        </span>
      </button>

      <!-- Dropdown -->
      <div
        *ngIf="isProfileDropdownOpen()"
        class="absolute right-0 mt-3 w-64 bg-surface border border-surface-variant rounded-2xl shadow-xl overflow-hidden animate-in fade-in slide-in-from-top-2"
      >

        <!-- User Info -->
        <div class="flex items-center gap-3 px-4 py-4">
          <img
            src="https://ui-avatars.com/api/?name=John+Doe&background=random"
            class="w-11 h-11 rounded-full ring-2 ring-primary-600/20"
          />
          <div class="min-w-0">
            <p class="text-sm font-semibold text-on-surface truncate">
              John Doe
            </p>
            <p class="text-xs text-on-surface-variant truncate">
              john.doeemail.com
            </p>
          </div>
        </div>

        <div class="h-px bg-surface-variant"></div>

        <!-- Menu Items -->
        <a
          routerLink="/user-profile"
          (click)="closeProfileDropdown()"
          class="flex items-center gap-3 px-4 py-2.5 text-sm text-on-surface transition-all duration-200 hover:bg-surface-variant hover:text-primary-600"
        >
          👤 <span>Profile</span>
        </a>

        <button
          class="flex items-center gap-3 w-full px-4 py-2.5 text-sm text-on-surface transition-all duration-200 hover:bg-surface-variant hover:text-primary-600"
        >
          ⚙️ <span>Settings</span>
        </button>

        <div class="h-px bg-surface-variant my-1"></div>

        <button
          (click)="logout()"
          class="flex items-center gap-3 w-full px-4 py-2.5 text-sm text-red-500 transition-all duration-200 hover:bg-red-500/10 hover:text-red-600"
        >
          🚪 <span>Logout</span>
        </button>

      </div>
    </div>
  </div>
</header>
